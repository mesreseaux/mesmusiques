<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PNL">
    
    <title>Lecteur PNL Gratuit</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overscroll-behavior-y: none;
        }

        .player-container {
            background: #1e1e1e;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            max-height: 90vh;
        }

        .info-lecture {
            text-align: center;
            margin-bottom: 20px;
        }

        #nom-album-actif {
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 5px 0;
        }

        #titre-musique {
            margin: 0;
            color: #1db954;
            font-size: 1.3rem;
        }

        audio {
            width: 100%;
            margin-bottom: 20px;
            outline: none;
        }

        .playlist {
            text-align: left;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .playlist::-webkit-scrollbar {
            width: 6px;
        }
        .playlist::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        .titre-album {
            font-size: 1.1rem;
            color: #ffffff;
            margin-top: 20px;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #333;
        }

        .titre-album:first-child {
            margin-top: 0;
        }

        .playlist button {
            display: block;
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 5px;
            background-color: transparent;
            color: #ccc;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .playlist button:hover, .playlist button.actif {
            background-color: #282828;
            color: #1db954;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="player-container">
    <div class="info-lecture">
        <p id="nom-album-actif">Sélectionnez un album</p>
        <h2 id="titre-musique">En attente de lecture...</h2>
    </div>
    
    <audio id="lecteur" controls>
        Votre navigateur ne supporte pas l'élément audio.
    </audio>

    <div class="playlist" id="conteneur-playlist">
        </div>
</div>

<script>
    const lecteur = document.getElementById('lecteur');
    const titreMusique = document.getElementById('titre-musique');
    const nomAlbumActif = document.getElementById('nom-album-actif');
    const conteneurPlaylist = document.getElementById('conteneur-playlist');

    // ==========================================
    // BASE DE DONNÉES PNL - DEUX FRÈRES (22 Pistes)
    // ==========================================
    const discographie = [
        {
            nomAlbum: "Deux frères",
            pistes: [
                { titre: "Au DD", url: "PNL/Deuxfrere/01 - PNL Au DD.mp3" },
                { titre: "Autre monde", url: "PNL/Deuxfrere/02 - PNL Autre monde.mp3" },
                { titre: "Chang", url: "PNL/Deuxfrere/03 - PNL Chang.mp3" },
                { titre: "Blanka", url: "PNL/Deuxfrere/04 - PNL Blanka.mp3" },
                { titre: "91's", url: "PNL/Deuxfrere/05 - PNL 91's.mp3" },
                { titre: "A l'ammoniaque", url: "PNL/Deuxfrere/06 - PNL A l'ammoniaque.mp3" },
                { titre: "Celsius", url: "PNL/Deuxfrere/07 - PNL Celsius.mp3" },
                { titre: "Deux frères", url: "PNL/Deuxfrere/08 - PNL Deux frères.mp3" },
                { titre: "Hasta la vista", url: "PNL/Deuxfrere/09 - PNL Hasta la vista.mp3" },
                { titre: "Cœurs", url: "PNL/Deuxfrere/10 - PNL Cœurs.mp3" },
                { titre: "Shenmue", url: "PNL/Deuxfrere/11 - PNL Shenmue.mp3" },
                { titre: "Kuta ubud", url: "PNL/Deuxfrere/12 - PNL Kuta ubud.mp3" },
                { titre: "Menace", url: "PNL/Deuxfrere/13 - PNL Menace.mp3" },
                { titre: "Zoulou tchaing", url: "PNL/Deuxfrere/14 - PNL Zoulou tchaing.mp3" },
                { titre: "Déconnecté", url: "PNL/Deuxfrere/15 - PNL Déconnecté.mp3" },
                { titre: "La misère est si belle", url: "PNL/Deuxfrere/16 - PNL La misère est si belle.mp3" },
                { titre: "Ryuk", url: "PNL/Deuxfrere/17 - PNL Ryuk.mp3" },
                { titre: "Comme pas deux", url: "PNL/Deuxfrere/18 - PNL Comme pas deux.mp3" },
                { titre: "Sibérie", url: "PNL/Deuxfrere/19 - PNL Sibérie.mp3" },
                { titre: "Bang", url: "PNL/Deuxfrere/20 - PNL Bang.mp3" },
                { titre: "Capuche", url: "PNL/Deuxfrere/21 - PNL Capuche.mp3" },
                { titre: "Frontières", url: "PNL/Deuxfrere/22 - PNL Frontières.mp3" }
            ]
        }
    ];

    let tousLesBoutons = [];

    function jouerMusique(url, titre, nomAlbum, boutonElement) {
        lecteur.src = url;
        titreMusique.innerText = titre;
        nomAlbumActif.innerText = nomAlbum;
        lecteur.play();

        tousLesBoutons.forEach(btn => btn.classList.remove('actif'));
        boutonElement.classList.add('actif');
    }

    discographie.forEach(album => {
        const titreSection = document.createElement('h3');
        titreSection.className = 'titre-album';
        titreSection.innerText = album.nomAlbum;
        conteneurPlaylist.appendChild(titreSection);

        album.pistes.forEach(piste => {
            const bouton = document.createElement('button');
            bouton.innerText = piste.titre;
            
            bouton.onclick = function() {
                jouerMusique(piste.url, piste.titre, album.nomAlbum, bouton);
            };
            
            tousLesBoutons.push(bouton);
            conteneurPlaylist.appendChild(bouton);
        });
    });

    lecteur.addEventListener('ended', function() {
        const indexActuel = tousLesBoutons.findIndex(btn => btn.classList.contains('actif'));
        
        if (indexActuel !== -1 && indexActuel < tousLesBoutons.length - 1) {
            tousLesBoutons[indexActuel + 1].click();
        }
    });

</script>

</body>
</html>
